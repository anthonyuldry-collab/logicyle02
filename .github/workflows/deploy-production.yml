name: Deploy Production

on:
  push:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      deploy_frontend:
        description: "Déployer le front (Netlify)"
        type: boolean
        default: true
      deploy_firebase:
        description: "Déployer rules + functions Firebase"
        type: boolean
        default: true

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  gate:
    name: Quality gate
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
      VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
      VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
      VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
      VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
      VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
      VITE_FIREBASE_MEASUREMENT_ID: ${{ secrets.VITE_FIREBASE_MEASUREMENT_ID }}
      VITE_FIREBASE_VAPID_KEY: ${{ secrets.VITE_FIREBASE_VAPID_KEY }}
      VITE_NOLIO_CLIENT_ID: ${{ secrets.VITE_NOLIO_CLIENT_ID }}
      VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}
      VITE_GPS_WEBHOOK_URL: ${{ secrets.VITE_GPS_WEBHOOK_URL }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: npm
      - run: npm ci --legacy-peer-deps
      - run: npm test
      - run: npm run build:check
      - run: npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: production-dist
          path: dist
          retention-days: 14

  deploy-netlify:
    name: Deploy Netlify
    needs: gate
    if: github.event_name == 'push' || inputs.deploy_frontend
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: production
    steps:
      - uses: actions/checkout@v4
      - name: Check Netlify secrets
        id: check
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
        run: |
          if [ -z "$NETLIFY_AUTH_TOKEN" ] || [ -z "$NETLIFY_SITE_ID" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Secrets Netlify absents — skip (lie le repo dans Netlify UI ou ajoute NETLIFY_AUTH_TOKEN + NETLIFY_SITE_ID)."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi
      - uses: actions/download-artifact@v4
        if: steps.check.outputs.skip == 'false'
        with:
          name: production-dist
          path: dist
      - name: Deploy to Netlify (production)
        if: steps.check.outputs.skip == 'false'
        uses: nwtgck/actions-netlify@v3.0
        with:
          publish-dir: "./dist"
          production-deploy: true
          github-token: ${{ secrets.GITHUB_TOKEN }}
          deploy-message: "Deploy ${{ github.sha }}"
          enable-commit-comment: false
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}

  deploy-firebase:
    name: Deploy Firebase (rules + functions)
    needs: gate
    if: github.event_name == 'push' || inputs.deploy_firebase
    runs-on: ubuntu-latest
    timeout-minutes: 25
    environment: production
    steps:
      - uses: actions/checkout@v4
      - name: Check Firebase service account
        id: check
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          if [ -z "$FIREBASE_SERVICE_ACCOUNT" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Secret FIREBASE_SERVICE_ACCOUNT absent — skip deploy Firebase."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi
      - uses: actions/setup-node@v4
        if: steps.check.outputs.skip == 'false'
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: functions/package-lock.json
      - name: Install functions dependencies
        if: steps.check.outputs.skip == 'false'
        working-directory: functions
        run: npm ci
      - name: Authenticate to Google Cloud
        if: steps.check.outputs.skip == 'false'
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
      - name: Deploy Firestore rules, Storage rules, Functions
        if: steps.check.outputs.skip == 'false'
        run: |
          npx firebase-tools@13 deploy \
            --project logicycle01 \
            --only firestore:rules,firestore:indexes,storage,functions \
            --force \
            --non-interactive
